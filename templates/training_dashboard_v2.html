{% extends "base.html" %}

{% block title %}Học Viện Số STD&D - Titan OS{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/training_dashboard.css') }}">
{% endblock %}

{% block content %}
<div x-data="homeApp()" x-cloak>

    <div x-show="loading" class="training-loading-wrap">
        <div class="spinner-border text-primary mb-2" role="status"></div>
        <p class="mb-0 text-secondary">Đang tải Thư viện đào tạo...</p>
    </div>

    <div x-show="loadError" class="training-error-wrap">
        <i class="fas fa-exclamation-triangle"></i>
        <h5 class="text-white fw-bold mb-2">Không tải được dữ liệu</h5>
        <p class="text-secondary mb-3">Vui lòng kiểm tra kết nối và thử lại.</p>
        <button type="button" class="btn btn-primary" @click="init()"><i class="fas fa-sync-alt me-1"></i> Thử lại</button>
    </div>

    <template x-if="!loading && !loadError">
    <div>
    <div class="hero-wrapper">
        <div class="hero-bg"></div>
        <div class="hero-content">
            <h1>Hệ thống Đào tạo <span class="text-primary">Titan Academy</span></h1>
            <p>Nâng cao năng lực chuyên môn và kỹ năng quản lý. Truy cập kho tri thức nội bộ mọi lúc, mọi nơi.</p>
            
            <div class="search-box">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="form-control search-input" 
                       placeholder="Tìm kiếm khóa học, tài liệu, quy trình..."
                       x-model="query" @input.debounce.500ms="search()" :disabled="searchLoading">
                <span x-show="searchLoading" class="position-absolute end-0 me-3 mt-2" style="top: 12px;"><span class="spinner-border spinner-border-sm text-light" role="status"></span></span>
                
                <div class="search-dropdown" x-show="results.length > 0">
                    <template x-for="item in results" :key="item.id">
                        <a :href="'/training/course/' + item.id" target="_blank" class="search-item d-flex align-items-center p-3 text-white text-decoration-none">
                            <img :src="item.thumbnail || 'https://cdn3d.iconscout.com/3d/premium/thumb/folder-5206733-4352249.png'" width="48" height="48" class="rounded-3 me-3" style="object-fit: contain; background: #2a2d35;">
                            <div>
                                <div class="fw-bold mb-1" x-text="item.title"></div>
                                <span class="badge bg-secondary bg-opacity-25 text-secondary border border-secondary border-opacity-25" x-text="item.category"></span>
                            </div>
                        </a>
                    </template>
                </div>
            </div>
        </div>
    </div>

    <div x-show="mandatoryCourses.length > 0" x-cloak>
        <div class="section-header">
            <h2 class="section-title"><i class="fas fa-exclamation-circle text-danger me-2"></i> Nhiệm vụ bắt buộc</h2>
            <span class="mandatory-badge" x-text="mandatoryCourses.length + ' khóa'"></span>
        </div>
        
        <div class="mandatory-grid">
            <template x-for="c in mandatoryCourses" :key="c.id">
                <div class="mandatory-card" @click="window.open('/training/course/' + c.id, '_blank')">
                    <div class="m-icon"><i class="fas fa-exclamation-triangle"></i></div>
                    <div class="flex-grow-1">
                        <div class="fw-bold text-white text-truncate mb-1" style="max-width: 200px;" x-text="c.title"></div>
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <small class="text-secondary" x-text="c.progress + '% hoàn thành'"></small>
                        </div>
                        <div class="progress" style="height: 4px; background: rgba(255,255,255,0.1);">
                            <div class="progress-bar bg-danger" :style="'width: ' + c.progress + '%'"></div>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <div class="section-header mt-5">
        <h2 class="section-title"><i class="fas fa-layer-group text-primary me-2"></i> Danh mục đào tạo</h2>
    </div>
    
    <div class="cat-grid">
        <template x-for="cat in categories" :key="cat.id">
            <div class="cat-card" @click="window.location.href = '/training/category/' + encodeURIComponent(cat.name)">
                <div class="cat-bg" :style="`background-image: url('${cat.bg}')`"></div>
                <div class="cat-overlay"></div>
                
                <div class="cat-icon-wrapper" x-html="cat.icon"></div>
                
                <div class="cat-content">
                    <h3 class="cat-name" x-text="cat.name"></h3>
                    <div class="cat-count">
                        <i class="fas fa-book-open"></i> <span x-text="cat.count + ' khóa học'"></span>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <div x-show="categories.every(c => c.count === 0)" class="training-empty-cat">
        <i class="fas fa-book-open d-block"></i>
        <h5 class="text-white fw-bold mb-2">Chưa có khóa học nào</h5>
        <p class="mb-0">Danh mục sẽ được cập nhật bởi quản trị viên.</p>
    </div>

    </div>
    </template>

</div>

<script src="{{ url_for('static', filename='js/training_dashboard.js') }}"></script>
{% endblock %}
